# ACT on RoboMimic Lift
policy:
  name: act
  obs_dim: 10
  action_dim: 7
  obs_horizon: 1
  pred_horizon: 16
  action_horizon: 16
  hidden_dim: 512
  num_layers: 4
  num_heads: 8
  dropout: 0.1

data:
  dataset_name: robomimic_lift
  root: data/robomimic/lift/ph/low_dim.hdf5
  format: hdf5
  obs_horizon: 1
  pred_horizon: 16
  batch_size: 64
  num_workers: 4

env:
  benchmark: robomimic
  task_name: Lift
  max_episode_steps: 400
  num_eval_episodes: 50

train:
  seed: 42
  device: cuda
  output_dir: outputs/
  exp_name: act_robomimic_lift
  num_epochs: 200
  steps_per_epoch: 500
  lr: 1.0e-5
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  use_ema: false
