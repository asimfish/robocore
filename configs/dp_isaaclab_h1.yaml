# Diffusion Policy on IsaacLab H1 Locomotion
policy:
  name: dp
  obs_dim: 48        # 根据实际 task 调整
  action_dim: 19     # H1 关节数
  obs_horizon: 2
  pred_horizon: 16
  action_horizon: 8
  hidden_dim: 256
  num_diffusion_steps: 100
  num_inference_steps: 10
  noise_schedule: squaredcos_cap_v2

data:
  dataset_name: isaaclab_h1_locomotion
  root: data/isaaclab/h1_locomotion/
  format: hdf5
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 256
  num_workers: 4
  normalize_action: true
  norm_mode: minmax

env:
  benchmark: isaaclab
  task_name: Isaac-Velocity-Rough-H1-v0
  num_envs: 64
  device: cuda:0
  headless: true
  max_episode_steps: 1000
  num_eval_episodes: 10

train:
  seed: 42
  device: cuda
  output_dir: outputs/
  exp_name: dp_isaaclab_h1
  num_epochs: 200
  steps_per_epoch: 1000
  lr: 3.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  use_amp: true
  amp_dtype: bf16
  use_ema: true
  ema_decay: 0.995
  log_interval: 10
  save_interval: 20
  eval_interval: 20
