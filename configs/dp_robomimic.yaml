# Diffusion Policy on RoboMimic Lift
policy:
  name: dp
  obs_dim: 10
  action_dim: 7
  obs_horizon: 2
  pred_horizon: 16
  action_horizon: 8
  hidden_dim: 256
  num_diffusion_steps: 100
  num_inference_steps: 10
  noise_schedule: squaredcos_cap_v2
  image_encoder: resnet18

data:
  dataset_name: robomimic_lift
  root: data/robomimic/lift/ph/low_dim.hdf5
  format: hdf5
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 64
  num_workers: 4
  normalize_action: true
  norm_mode: minmax

env:
  benchmark: robomimic
  task_name: Lift
  max_episode_steps: 400
  num_eval_episodes: 50

train:
  seed: 42
  device: cuda
  output_dir: outputs/
  exp_name: dp_robomimic_lift
  num_epochs: 100
  steps_per_epoch: 500
  lr: 1.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  use_amp: true
  amp_dtype: bf16
  use_ema: true
  ema_decay: 0.995
  log_interval: 10
  save_interval: 10
  eval_interval: 10
