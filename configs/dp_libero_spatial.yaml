# Diffusion Policy on LIBERO-Spatial (10 tasks)
# 使用方式: robocore train --config configs/dp_libero_spatial.yaml
#
# 前置条件:
#   1. 安装 LIBERO:
#      git clone https://github.com/Lifelong-Robot-Learning/LIBERO.git
#      cd LIBERO && pip install -e .
#   2. 安装 robosuite>=1.4:
#      pip install robosuite==1.4.0
#   3. 下载 LIBERO 数据集到 data/libero/ 目录
#      参考: https://lifelong-robot-learning.github.io/LIBERO/

policy:
  name: dp
  obs_dim: 16          # eef_pos(3) + eef_quat(4) + gripper(2) + joint_pos(7)
  action_dim: 7
  obs_horizon: 2
  pred_horizon: 16
  action_horizon: 8
  hidden_dim: 256
  num_diffusion_steps: 100
  num_inference_steps: 10
  noise_schedule: squaredcos_cap_v2
  image_encoder: resnet18
  image_size: [128, 128]

data:
  dataset_name: libero_spatial
  root: data/libero/libero_spatial/
  format: hdf5
  obs_horizon: 2
  pred_horizon: 16
  batch_size: 64
  num_workers: 4
  normalize_action: true
  norm_mode: minmax

env:
  benchmark: libero
  task_name: libero_spatial
  task_id: 0
  camera_names: [agentview, robot0_eye_in_hand]
  camera_height: 128
  camera_width: 128
  max_episode_steps: 300
  num_eval_episodes: 20

train:
  seed: 42
  device: cuda
  output_dir: outputs/
  exp_name: dp_libero_spatial
  num_epochs: 100
  steps_per_epoch: 500
  lr: 1.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  use_amp: true
  amp_dtype: bf16
  use_ema: true
  ema_decay: 0.995
  log_interval: 10
  save_interval: 10
  eval_interval: 10
