name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          python -c "from robocore.policy import PolicyRegistry; print(f'Policies: {len(PolicyRegistry.list())}')"
          python -c "from robocore.data.adapters import DatasetRegistry; print(f'Datasets: {len(DatasetRegistry.list())}')"
